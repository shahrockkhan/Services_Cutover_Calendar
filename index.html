<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css">
</head>
<body>
    <div id="calendar"></div>
    <form id="bookingForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="text" id="firstName" placeholder="First Name" required />
        <input type="text" id="lastName" placeholder="Last Name" required />
        <button type="submit">Book</button>
    </form>
    <div id="status"></div>
    <script>
        $(document).ready(function() {
            var selectedDates = [];
            $('#calendar').fullCalendar({
                selectable: true,
                selectHelper: true,
                select: function(start, end) {
                    var date = moment(start).format('YYYY-MM-DD');
                    selectedDates.push(date);
                    $(this).fullCalendar('renderEvent', {
                        title: 'Selected',
                        start: start,
                        end: end,
                        rendering: 'background',
                    });
                    $('#calendar').fullCalendar('unselect');
                },
                eventClick: function(event) {
                    alert('Event: ' + event.title);
                }
            });

            $('#bookingForm').on('submit', function(event) {
                event.preventDefault();
                var email = $('#email').val();
                var firstName = $('#firstName').val();
                var lastName = $('#lastName').val();
                var bookingTimestamp = moment().tz('America/New_York').format('YYYY-MM-DD HH:mm:ss');

                $('#status').append(`<p>Event booked by ${firstName} ${lastName} (${email}) on ${bookingTimestamp}</p>`);
                $('#bookingForm')[0].reset();
            });
        });
    </script>
</body>
</html>
