<!DOCTYPE html>
<html>
<head>
    <title>Services Cutover Calendar</title>
    <script>
        // Functionality for Ctrl+Click multi-date selection with range drag support
        function setupDateSelection() {
            // Implementation goes here
        }

        // Function to validate form fields
        function validateForm() {
            const email = document.getElementById('email').value;
            const firstName = document.getElementById('first_name').value;
            const lastName = document.getElementById('last_name').value;
            if (!email || !firstName || !lastName) {
                alert('Mandatory fields cannot be empty!');
                return false;
            }
            return true;
        }

        // Function to get booking timestamp in EST timezone
        function getBooking_timestamp() {
            const utcDate = new Date();
            const options = { timeZone: 'America/New_York', hour12: false }; // Eastern Standard Time
            return utcDate.toLocaleString('en-US', options);
        }

        // Function to show when event was booked
        function showWhenEventBooked() {
            const timestamp = getBooking_timestamp();
            document.getElementById('booking_time').innerText = `Event booked at: ${timestamp}`;
        }
    </script>
</head>
<body onload="setupDateSelection();">
    <h1>Services Cutover Calendar</h1>
    <form onsubmit="return validateForm();">
        <input type="email" id="email" placeholder="Email" required />
        <input type="text" id="first_name" placeholder="First Name" required />
        <input type="text" id="last_name" placeholder="Last Name" required />
        <button type="submit" onclick="showWhenEventBooked();">Book Event</button>
    </form>
    <p id="booking_time"></p>
</body>
</html>
